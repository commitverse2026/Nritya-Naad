<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nritya Naad — Dance Forms Mind Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap');

:root {
  --bg: #faf8f4;
  --surface: #ffffff;
  --border: #e8e2d8;
  --text: #1a1612;
  --muted: #7a6f65;
  --accent: #c8522a;
  --gold: #b8892a;
  --node-classical: #7c3d78;
  --node-folk: #2d6e4f;
  --node-tribal: #8b4513;
  --node-fusion: #1a4d7a;
  --node-center: #c8522a;
  --panel-bg: #ffffff;
  --shadow: 0 8px 40px rgba(0,0,0,0.12);
  --transition: all 0.32s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg: #141010;
  --surface: #1e1a18;
  --border: #2e2824;
  --text: #f0ebe4;
  --muted: #9a8f85;
  --panel-bg: #1e1a18;
  --shadow: 0 8px 40px rgba(0,0,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── Topbar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.3px;
  flex-shrink: 0;
}
.logo span { font-style: italic; font-weight: 400; color: var(--muted); font-size: 0.85rem; margin-left: 6px; }
.topbar-search {
  flex: 1;
  max-width: 320px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.topbar-search:focus { border-color: var(--accent); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  color: var(--muted);
  transition: var(--transition);
}
.icon-btn:hover { background: var(--bg); color: var(--text); }

/* ── Legend ── */
.legend {
  position: fixed; top: 68px; left: 20px; z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  min-width: 148px;
}
.legend-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.78rem;
  color: var(--text);
  margin-bottom: 6px;
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 6px;
  transition: background 0.15s;
}
.legend-item:hover { background: var(--bg); }
.legend-item:last-child { margin-bottom: 0; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Canvas ── */
#canvas {
  position: fixed;
  top: 56px; left: 0; right: 0; bottom: 0;
  cursor: grab;
  touch-action: none;
}
#canvas:active { cursor: grabbing; }
#canvas svg {
  width: 100%; height: 100%;
  display: block;
}

/* ── Info panel ── */
.info-panel {
  position: fixed;
  right: -420px;
  top: 56px; bottom: 0;
  width: 380px;
  background: var(--panel-bg);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: right 0.38s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 150;
}
.info-panel.open { right: 0; }

.panel-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.panel-close {
  position: absolute; top: 20px; right: 20px;
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: background 0.15s;
}
.panel-close:hover { background: var(--bg); }
.panel-category {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.panel-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 4px;
}
.panel-region {
  font-size: 0.82rem;
  color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}

.panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.panel-section { margin-bottom: 22px; }
.panel-section-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-desc {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text);
}
.panel-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.tag {
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
  font-weight: 500;
}
.panel-facts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.fact-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}
.fact-label {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.fact-value {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
}
.related-list { display: flex; flex-direction: column; gap: 6px; }
.related-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 14px;
  text-align: left;
  cursor: pointer;
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  transition: background 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.related-btn:hover { background: var(--bg); }
.related-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Zoom controls ── */
.zoom-controls {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 6px;
  z-index: 100;
}
.zoom-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.zoom-btn:hover { background: var(--bg); }

/* ── Node hover tooltip ── */
.node-tooltip {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 300;
  white-space: nowrap;
}
.node-tooltip.show { opacity: 1; }

/* ── SVG nodes ── */
.mindmap-node {
  cursor: pointer;
  transition: filter 0.2s;
}
.mindmap-node:hover { filter: brightness(1.08); }
.mindmap-node.active circle,
.mindmap-node.active ellipse { stroke-width: 3 !important; }

/* ── Scrollbar ── */
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .info-panel { width: 100%; right: -110%; }
  .legend { display: none; }
}

/* ── Search highlight ── */
.node-highlight { animation: pulse 0.6s ease; }
@keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.4) drop-shadow(0 0 8px currentColor)} }
</style>
</head>

<header class="topbar">

<!-- Zoom -->
<div class="zoom-controls">

</div>

<!-- Tooltip -->
<div class="node-tooltip" id="tooltip"></div>

// LAYOUT — radial mind map

const CATEGORY_META = {
  classical: { label:"Classical", color:"#7c3d78", baseAngle: 0,   spread: 140, count:8 },
  folk:      { label:"Folk",      color:"#2d6e4f", baseAngle: 140, spread: 100, count:5 },
  tribal:    { label:"Tribal",    color:"#8b4513", baseAngle: 240, spread: 80,  count:3 },
  fusion:    { label:"Fusion",    color:"#1a4d7a", baseAngle: 320, spread: 60,  count:2 },
};

const W = 1600, H = 1200, CX = 800, CY = 600;
const INNER_R = 200, OUTER_R = 420;

function toRad(deg){ return deg * Math.PI / 180; }

function computeLayout(){
  const nodes = [];
  // Center
  nodes.push({ ...DANCES.center, x: CX, y: CY });

  // Category branches
  const catDances = { classical:[], folk:[], tribal:[], fusion:[] };
  Object.values(DANCES).forEach(d => {
    if(d.category && d.category !== "center") catDances[d.category]?.push(d);
  });

  Object.entries(CATEGORY_META).forEach(([cat, meta]) => {
    const items = catDances[cat];
    if(!items.length) return;

    // Spread items evenly across the arc
    const startAngle = meta.baseAngle;
    const spread = meta.spread;
    items.forEach((dance, i) => {
      const frac = items.length > 1 ? i / (items.length - 1) : 0.5;
      const angleDeg = startAngle + (frac - 0.5) * spread;
      const angle = toRad(angleDeg);
      const r = OUTER_R + (i % 2 === 0 ? 0 : 30); // slight stagger
      nodes.push({
        ...dance,
        x: CX + Math.cos(angle) * r,
        y: CY + Math.sin(angle) * r,
        angle,
      });
    });
  });

  return nodes;
}

// ─────────────────────────────────────────────────────────
// RENDER SVG
// ─────────────────────────────────────────────────────────
let transform = { x: 0, y: 0, scale: 1 };
let isDragging = false, dragStart = { x:0, y:0 }, dragOrigin = { x:0, y:0 };
let activeNode = null;

const svg = document.getElementById("mindmap-svg");
const tooltip = document.getElementById("tooltip");

function renderMap(nodes){
  // Clear
  while(svg.firstChild) svg.removeChild(svg.firstChild);

  // Defs
  const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");
  // Subtle pattern for bg
  defs.innerHTML = `
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5ede0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#faf8f4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="1.5"/></filter>
  `;
  svg.appendChild(defs);

  const root = document.createElementNS("http://www.w3.org/2000/svg","g");
  root.setAttribute("id","map-root");
  svg.appendChild(root);

  // Background radial
  const bgCircle = makeEl("circle", { cx:CX, cy:CY, r:500, fill:"url(#bg-grad)" });
  root.appendChild(bgCircle);

  const center = nodes.find(n => n.id === "center");
  const leaves = nodes.filter(n => n.id !== "center");

  // Draw edges first
  const edgeGroup = document.createElementNS("http://www.w3.org/2000/svg","g");
  edgeGroup.setAttribute("id","edges");
  root.appendChild(edgeGroup);

  leaves.forEach(n => {
    // Curve from center to node
    const mx = (CX + n.x) / 2;
    const my = (CY + n.y) / 2;
    // Control point perpendicular
    const dx = n.x - CX, dy = n.y - CY;
    const perp = { x: -dy * 0.2, y: dx * 0.2 };

    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d", `M ${CX} ${CY} Q ${mx+perp.x} ${my+perp.y} ${n.x} ${n.y}`);
    path.setAttribute("fill","none");
    path.setAttribute("stroke", n.color);
    path.setAttribute("stroke-width","1.5");
    path.setAttribute("stroke-opacity","0.35");
    path.setAttribute("class", `edge edge-${n.category}`);
    edgeGroup.appendChild(path);
  });

  // Draw center
  const centerG = makeGroup("mindmap-node", center);
  const c1 = makeEl("circle", { cx:CX, cy:CY, r: 52, fill:"#c8522a", stroke:"#e8724a", "stroke-width":2 });
  const c2 = makeEl("text", { x:CX, y:CY-8, "text-anchor":"middle", "dominant-baseline":"central",
    style:"font-family:'Playfair Display',serif;font-size:15px;fill:#fff;font-weight:600;" });
  c2.textContent = "Indian";
  const c3 = makeEl("text", { x:CX, y:CY+12, "text-anchor":"middle", "dominant-baseline":"central",
    style:"font-family:'Playfair Display',serif;font-size:13px;fill:rgba(255,255,255,0.8);font-style:italic;" });
  c3.textContent = "Dance";
  centerG.appendChild(c1);
  centerG.appendChild(c2);
  centerG.appendChild(c3);
  centerG.addEventListener("click", () => openPanel(DANCES.center));
  root.appendChild(centerG);

  // Draw leaf nodes
  const nodeGroup = document.createElementNS("http://www.w3.org/2000/svg","g");
  nodeGroup.setAttribute("id","nodes");
  root.appendChild(nodeGroup);

  leaves.forEach(n => {
    const isDark = isLightColor(n.color);
    const g = makeGroup("mindmap-node", n);
    g.setAttribute("data-id", n.id);
    g.setAttribute("data-cat", n.category);

    // Node shape — ellipse for visual interest
    const ellipse = makeEl("ellipse", {
      cx: n.x, cy: n.y,
      rx: 70, ry: 26,
      fill: n.color,
      stroke: "white",
      "stroke-width": "1.5",
      "stroke-opacity": "0.25",
    });

    const label = makeEl("text", {
      x: n.x, y: n.y,
      "text-anchor":"middle", "dominant-baseline":"central",
      style:`font-family:'DM Sans',sans-serif;font-size:12.5px;fill:white;font-weight:500;pointer-events:none;`,
    });
    label.textContent = n.name;

    const region = makeEl("text", {
      x: n.x, y: n.y + 13,
      "text-anchor":"middle", "dominant-baseline":"central",
      style:`font-family:'DM Mono',monospace;font-size:9px;fill:rgba(255,255,255,0.65);pointer-events:none;`,
    });
    region.textContent = n.region.split("/")[0].trim();

    g.appendChild(ellipse);
    g.appendChild(label);
    // Only show region label if node is big enough
    g.appendChild(region);

    g.addEventListener("click", (e) => {
      e.stopPropagation();
      setActive(n.id);
      openPanel(DANCES[n.id]);
    });

    g.addEventListener("mouseenter", (e) => {
      showTooltip(n.name, e);
      // Highlight connected edge
      document.querySelectorAll(".edge").forEach(edge => edge.setAttribute("stroke-opacity","0.1"));
      const edges = document.querySelectorAll(`.edge-${n.category}`);
      edges.forEach(edge => edge.setAttribute("stroke-opacity","0.6"));
    });
    g.addEventListener("mouseleave", () => {
      hideTooltip();
      document.querySelectorAll(".edge").forEach(edge => edge.setAttribute("stroke-opacity","0.35"));
    });
    g.addEventListener("mousemove", (e) => showTooltip(n.name, e));

    nodeGroup.appendChild(g);
  });

  updateTransform();
}

function makeEl(tag, attrs){
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
  return el;
}
function makeGroup(cls, node){
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class", cls);
  return g;
}

function isLightColor(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 180;
}

// ─────────────────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────────────────
function openPanel(dance){
  if(!dance) return;
  const panel = document.getElementById("info-panel");
  const catMeta = CATEGORY_META[dance.category];

  document.getElementById("p-category").textContent = catMeta?.label || "Overview";
  document.getElementById("p-category").style.color = dance.color;

  document.getElementById("p-name").textContent = dance.name;
  document.getElementById("p-region").innerHTML = `<span>📍</span>${dance.region}`;
  document.getElementById("p-desc").textContent = dance.desc;

  // Facts
  const factsEl = document.getElementById("p-facts");
  factsEl.innerHTML = "";
  const facts = [
    ["Origin", dance.origin || "—"],
    ["Governing", dance.governing || "—"],
    ["Costume", dance.costume || "—"],
    ["Region", dance.region || "—"],
  ];
  facts.forEach(([label, val]) => {
    factsEl.innerHTML += `
      <div class="fact-card">
        <div class="fact-label">${label}</div>
        <div class="fact-value">${val}</div>
      </div>
    `;
  });

  // Tags
  const tagsEl = document.getElementById("p-tags");
  tagsEl.innerHTML = "";
  (dance.tags || []).forEach(tag => {
    const t = document.createElement("span");
    t.className = "tag";
    t.textContent = tag;
    t.style.color = dance.color;
    t.style.borderColor = dance.color + "40";
    t.style.background = dance.color + "12";
    tagsEl.appendChild(t);
  });

  // Related
  const relEl = document.getElementById("p-related");
  relEl.innerHTML = "";
  (dance.related || []).forEach(relId => {
    const rel = DANCES[relId];
    if(!rel) return;
    const btn = document.createElement("button");
    btn.className = "related-btn";
    btn.innerHTML = `<span class="related-dot" style="background:${rel.color}"></span>${rel.name} <span style="margin-left:auto;color:var(--muted);font-size:0.72rem;">${rel.region.split("/")[0].trim()}</span>`;
    btn.addEventListener("click", () => {
      setActive(rel.id);
      openPanel(rel);
      panToNode(rel.id);
    });
    relEl.appendChild(btn);
  });

  panel.classList.add("open");
}

function closePanel(){
  document.getElementById("info-panel").classList.remove("open");
  clearActive();
}

function setActive(id){
  clearActive();
  activeNode = id;
  const g = document.querySelector(`[data-id="${id}"]`);
  if(g){
    g.classList.add("active");
    const ellipse = g.querySelector("ellipse");
    if(ellipse){
      ellipse.setAttribute("stroke","white");
      ellipse.setAttribute("stroke-width","3");
      ellipse.setAttribute("stroke-opacity","0.7");
    }
  }
}

function clearActive(){
  document.querySelectorAll(".mindmap-node.active").forEach(g => {
    g.classList.remove("active");
    const ellipse = g.querySelector("ellipse");
    if(ellipse){
      ellipse.setAttribute("stroke","white");
      ellipse.setAttribute("stroke-width","1.5");
      ellipse.setAttribute("stroke-opacity","0.25");
    }
  });
  activeNode = null;
}

// ─────────────────────────────────────────────────────────
// PAN / ZOOM
// ─────────────────────────────────────────────────────────
function updateTransform(){
  const root = document.getElementById("map-root");
  if(!root) return;
  const vw = window.innerWidth, vh = window.innerHeight - 56;
  // Auto-fit to viewport
  const scaleX = vw / W, scaleY = vh / H;
  const baseScale = Math.min(scaleX, scaleY) * 0.9;
  root.setAttribute("transform",
    `translate(${transform.x},${transform.y}) scale(${baseScale * transform.scale})`
  );
  svg.setAttribute("viewBox", `0 0 ${vw} ${vh}`);
}

function resetView(){
  transform = { x:0, y:0, scale:1 };
  const root = document.getElementById("map-root");
  if(!root) return;
  const vw = window.innerWidth, vh = window.innerHeight - 56;
  const scaleX = vw / W, scaleY = vh / H;
  const baseScale = Math.min(scaleX, scaleY) * 0.9;
  const offsetX = (vw - W * baseScale) / 2;
  const offsetY = (vh - H * baseScale) / 2;
  root.setAttribute("transform", `translate(${offsetX},${offsetY}) scale(${baseScale})`);
  svg.setAttribute("viewBox", `0 0 ${vw} ${vh}`);
}

function zoomIn(){ transform.scale = Math.min(transform.scale * 1.2, 3); updateTransform(); }
function zoomOut(){ transform.scale = Math.max(transform.scale / 1.2, 0.4); updateTransform(); }

// Drag-to-pan
svg.addEventListener("mousedown", e => {
  if(e.target === svg || e.target.tagName === "defs") {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragOrigin = { x: transform.x, y: transform.y };
  }
});
window.addEventListener("mousemove", e => {
  if(!isDragging) return;
  transform.x = dragOrigin.x + (e.clientX - dragStart.x);
  transform.y = dragOrigin.y + (e.clientY - dragStart.y);
  updateTransform();
});
window.addEventListener("mouseup", () => { isDragging = false; });

// Scroll-to-zoom
svg.addEventListener("wheel", e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  transform.scale = Math.min(Math.max(transform.scale * delta, 0.3), 4);
  updateTransform();
}, { passive: false });

// Touch pan
let lastTouch = null;
svg.addEventListener("touchstart", e => {
  if(e.touches.length === 1) lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
svg.addEventListener("touchmove", e => {
  if(e.touches.length !== 1 || !lastTouch) return;
  e.preventDefault();
  transform.x += e.touches[0].clientX - lastTouch.x;
  transform.y += e.touches[0].clientY - lastTouch.y;
  lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  updateTransform();
}, { passive: false });
svg.addEventListener("touchend", () => { lastTouch = null; });

function panToNode(id){
  const dance = DANCES[id];
  if(!dance || !dance.x) return;
  // handled by layout
}

// ─────────────────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────────────────
function showTooltip(text, e){
  tooltip.textContent = text;
  tooltip.classList.add("show");
  tooltip.style.left = (e.clientX + 12) + "px";
  tooltip.style.top  = (e.clientY - 8) + "px";
}
function hideTooltip(){
  tooltip.classList.remove("show");
}

// ─────────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────────
document.getElementById("search-input").addEventListener("input", function(){
  const q = this.value.toLowerCase().trim();
  if(!q){ unhighlightAll(); return; }

  const matches = Object.values(DANCES).filter(d =>
    d.id !== "center" &&
    (d.name.toLowerCase().includes(q) ||
     d.region.toLowerCase().includes(q) ||
     (d.tags||[]).some(t => t.toLowerCase().includes(q)))
  );

  unhighlightAll();
  matches.forEach(d => {
    const g = document.querySelector(`[data-id="${d.id}"]`);
    if(g){
      g.classList.add("node-highlight");
      // Open first match
      if(matches.indexOf(d) === 0){
        setActive(d.id);
        openPanel(d);
      }
    }
  });
});

function unhighlightAll(){
  document.querySelectorAll(".mindmap-node").forEach(g => g.classList.remove("node-highlight"));
}

// ─────────────────────────────────────────────────────────
// FILTER BY CATEGORY
// ─────────────────────────────────────────────────────────
function filterCategory(cat){
  document.querySelectorAll(".mindmap-node[data-cat]").forEach(g => {
    const nodeCat = g.getAttribute("data-cat");
    if(!cat || nodeCat === cat){
      g.style.opacity = "1";
    } else {
      g.style.opacity = "0.2";
    }
  });
  document.querySelectorAll(".edge").forEach(edge => {
    const edgeCat = [...edge.classList].find(c => c.startsWith("edge-"))?.replace("edge-","");
    if(!cat || edgeCat === cat){
      edge.setAttribute("stroke-opacity","0.4");
    } else {
      edge.setAttribute("stroke-opacity","0.05");
    }
  });
}

// ─────────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────────
let darkMode = false;
function toggleTheme(){
  darkMode = !darkMode;
  document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "");
  document.getElementById("theme-btn").textContent = darkMode ? "☀" : "☾";
}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
const nodes = computeLayout();
// Attach computed positions back to DANCES for panTo
nodes.forEach(n => { if(DANCES[n.id]) { DANCES[n.id].x = n.x; DANCES[n.id].y = n.y; } });

renderMap(nodes);
setTimeout(resetView, 50);
window.addEventListener("resize", resetView);

// Click canvas to deselect
svg.addEventListener("click", e => {
  if(e.target === svg){
    closePanel();
  }
});
</script>
